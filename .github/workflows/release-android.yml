name: Release Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-android:
    name: Build And Publish Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.1.0"

      - name: Restore signing files
        run: |
          mkdir -p signing
          echo "${{ secrets.FITNESS_PLAN_KEYSTORE_BASE64 }}" | base64 --decode > signing/fitness-plan-release.jks
          cat > keystore.properties <<EOF
          storeFile=signing/fitness-plan-release.jks
          storePassword=${{ secrets.FITNESS_PLAN_STORE_PASSWORD }}
          keyAlias=${{ secrets.FITNESS_PLAN_KEY_ALIAS }}
          keyPassword=${{ secrets.FITNESS_PLAN_KEY_PASSWORD }}
          EOF

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build signed release APK
        run: ./gradlew --no-daemon clean assembleRelease

      - name: Prepare release artifact
        id: release_file
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME:-manual}"
          SOURCE_APK="app/build/outputs/apk/release/app-release.apk"
          TARGET_APK="app/build/outputs/apk/release/fitness-plan-${TAG_NAME}.apk"
          cp "$SOURCE_APK" "$TARGET_APK"
          echo "apk_path=$TARGET_APK" >> "$GITHUB_OUTPUT"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitness-plan-release-apk
          path: ${{ format('android-app/{0}', steps.release_file.outputs.apk_path) }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          APK_PATH="${{ steps.release_file.outputs.apk_path }}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$APK_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$APK_PATH" \
              --title "$TAG_NAME" \
              --generate-notes
          fi
